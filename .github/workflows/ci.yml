name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      - run: yarn lint

      - run: yarn typecheck

      - run: yarn test

      - run: yarn build
        env:
          APPWRITE_PROJECT_ID: ci-placeholder
          APPWRITE_API_KEY: ci-placeholder
          APPWRITE_DATABASE_ID: main
